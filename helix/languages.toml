[language-server.fish_lsp]
command = "fish-lsp"
args = ["start"]
environment.fish_lsp_diagnostic_disable_error_codes = "2002"
environment.fish_lsp_show_client_popups = "false"

[[language]]
name = "fish"
language-servers = ["fish_lsp"]

[[language]]
name = "lua"
auto-format = true

[[language]]
name = "toml"
auto-format = true
