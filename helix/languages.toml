[language-server]
ruff = { command = "ruff", args = ["server"] }
scls = { command = "simple-completion-language-server" }

[language-server.fish_lsp]
command = "fish-lsp"
args = ["start"]

[language-server.fish_lsp.environment]
fish_lsp_show_client_popups = "false"
fish_lsp_diagnostic_disable_error_codes = "2002"

[[language]]
name = "bash"
language-servers = ["bash-language-server", "scls"]

[[language]]
name = "fish"
language-servers = ["fish-lsp", "scls"]

[[language]]
name = "json"
language-servers = ["vscode-json-language-server", "scls"]

[[language]]
name = "lua"
shebangs = ["lua", "luajit"]
auto-format = true

[[language]]
name = "nix"
language-servers = ["nil", "scls"]
formatter = { command = "alejandra" }
auto-format = true

[[language]]
name = "python"
language-servers = [
  { name = "ruff", except-features = [
    "hover",
  ] },
  "pylsp",
  "scls",
]
# TODO either remove or apply to ruff
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "txt"
scope = "source.txt"
file-types = ["txt"]
language-servers = ["scls"]

[[language]]
name = "toml"
language-servers = ["taplo", "scls"]
auto-format = true

# TODO more matchers like gitconfig
