theme = "tokyonight_moon"

[editor]
color-modes = true
popup-border = "popup"
rulers = [100]
text-width = 100

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true

[editor.lsp]
display-inlay-hints = true

[editor.statusline]
mode.normal = "N"
mode.insert = "I"
mode.select = "S"
right = [
  "diagnostics",
  "selections",
  "register",
  "file-encoding",
  "file-type",
  "spacer",
  "position-percentage",
  "spacer",
  "position",
]

[editor.whitespace.render]
tab = "all"

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
"$" = "goto_line_end"
"0" = "goto_line_start"
"G" = "goto_file_end"
"A-x" = "select_line_below"
"X" = "extend_line_above"
"A-X" = "select_line_above"
"\\" = "match_brackets"
"^" = "goto_first_nonwhitespace"
"{" = "goto_prev_paragraph"
"}" = "goto_next_paragraph"

[keys.select]
"$" = "goto_line_end"
"0" = "goto_line_start"
"G" = "goto_file_end"
"A-x" = "select_line_below"
"X" = "extend_line_above"
"A-X" = "select_line_above"
"\\" = "match_brackets"
"^" = "goto_first_nonwhitespace"
"{" = "goto_prev_paragraph"
"}" = "goto_next_paragraph"

