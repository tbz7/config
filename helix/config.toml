theme = "match-fish"

[editor]
color-modes = true
popup-border = "all"
rulers = [100]
text-width = 100

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true

[editor.lsp]
display-inlay-hints = true

[editor.statusline]
mode.normal = "N"
mode.insert = "I"
mode.select = "S"
right = [
  "diagnostics",
  "selections",
  "register",
  "file-encoding",
  "file-type",
  "spacer",
  "position-percentage",
  "spacer",
  "position",
]

[editor.whitespace.render]
tab = "all"

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
"$" = "extend_to_line_end"
"0" = "extend_to_line_start"
"G" = "goto_file_end"
"C-x" = "select_line_below"
"X" = "extend_line_above"
"C-X" = "select_line_above"
";" = "repeat_last_motion"
"\\" = "match_brackets"
"^" = "goto_first_nonwhitespace"
"{" = "goto_prev_paragraph"
"}" = "goto_next_paragraph"

[keys.normal." "]
"[" = ":set gutters.layout []"
"]" = ':set gutters.layout ["diagnostics","spacer","line-numbers","spacer","diff"]'
"w" = ":toggle soft-wrap.enable"
"W" = '@<C-s>%<A-|>sudo tee "<C-r>%"<ret>:reload<ret><C-o>'

[keys.select]
"$" = "extend_to_line_end"
"0" = "extend_to_line_start"
"G" = "goto_file_end"
"C-x" = "select_line_below"
"X" = "extend_line_above"
"C-X" = "select_line_above"
";" = "repeat_last_motion"
"\\" = "match_brackets"
"^" = "goto_first_nonwhitespace"
"{" = "goto_prev_paragraph"
"}" = "goto_next_paragraph"
